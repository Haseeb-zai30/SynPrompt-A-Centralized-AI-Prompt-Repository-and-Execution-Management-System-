<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SynPrompt{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --orange: #ff9900;
            --orange-dark: #ff7a00;
            --black: #111827;
            --dark: #1f2937;
            --bg: #f8fafc;
            --gradient-primary: linear-gradient(135deg, #111827, #1f2937 60%, #ff9900);
        }

        body {
            background: var(--bg);
            color: #1e293b;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .navbar {
            background: white !important;
            border-bottom: 1px solid #e2e8f0;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.025em;
        }

        .brand-orange {
            color: var(--orange);
        }

        .nav-link {
            font-weight: 500;
            color: #475569 !important;
            transition: color 0.15s ease;
        }

        .nav-link:hover {
            color: var(--orange) !important;
        }

        .main-content {
            min-height: calc(100vh - 160px);
        }

        .footer {
            background: white;
            border-top: 1px solid #e5e7eb;
        }

        .btn-orange {
            background: var(--orange);
            color: white;
            border: none;
            transition: background 0.15s ease;
        }

        .btn-orange:hover {
            background: var(--orange-dark);
            color: white;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand text-dark" href="/dashboard">
                <i class="fa-solid fa-bolt brand-orange me-1"></i>Syn<span class="brand-orange">Prompt</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbar">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/dashboard"><i class="fa-solid fa-house me-1"></i>Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/prompts"><i class="fa-solid fa-terminal me-1"></i>Prompts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/projects"><i class="fa-solid fa-folder me-1"></i>Projects</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/favorites"><i class="fa-solid fa-star text-warning me-1"></i>Favorites</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/executions"><i class="fa-solid fa-clock-rotate-left me-1"></i>History</a>
                    </li>
                    
                    <li class="nav-item ms-lg-2 my-2 my-lg-0">
                        <form class="d-flex" method="GET" action="/search">
                            <input class="form-control me-2 form-control-sm rounded-2" type="search" name="query" placeholder="Search prompts..." required>
                            <button class="btn btn-sm btn-orange rounded-2" type="submit">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                        </form>
                    </li>

                    <li class="nav-item ms-lg-3">
                        <a href="/logout" class="btn btn-sm btn-outline-danger rounded-pill px-3">
                            <i class="fa-solid fa-right-from-bracket me-1"></i>Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 main-content">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer text-center py-4 mt-5">
        <small class="text-muted fw-medium">
            &copy; 2026 SynPrompt &bull; AI Prompt & Project Repository
        </small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
