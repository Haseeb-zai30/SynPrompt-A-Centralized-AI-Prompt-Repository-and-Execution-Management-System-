<!DOCTYPE html>

<html>
<head>
    <title>My Prompts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
<h2>My Prompts</h2>

<a href="/add_prompt" class="btn btn-primary mb-3">
    Add New Prompt
</a>

<a href="/dashboard" class="btn btn-secondary mb-3">
    Dashboard
</a>

<table class="table table-bordered">

    <thead>
        <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Created</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>

    {% for prompt in prompts %}
        <tr>
            <td>{{ prompt[1] }}</td>
            <td>{{ prompt[2] }}</td>
            <td>{{ prompt[3] }}</td>

           <td>

    <a href="/edit_prompt/{{ prompt[0] }}"
       class="btn btn-warning btn-sm">
       Edit
    </a>

    <a href="/delete_prompt/{{ prompt[0] }}"
       class="btn btn-danger btn-sm">
       Delete
    </a>

    <a href="/add_favorite/{{ prompt[0] }}"
       class="btn btn-info btn-sm">
       Favorite
    </a>
    <a href="/run_prompt/{{ prompt[0] }}"
   class="btn btn-success btn-sm">
   Run AI
</a>

</td>
            

        </tr>
    {% endfor %}

    </tbody>

</table>

</div>

</body>
</html>
