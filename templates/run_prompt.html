<!DOCTYPE html>
<html>
<head>
    <title>Run Prompt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>{{ prompt[1] }}</h2>

    <div class="card mb-3">
        <div class="card-body">
            {{ prompt[2] }}
        </div>
    </div>

    <form method="POST">

        <label>Select Model</label>

        <select name="model_id" class="form-control mb-3">

            {% for model in models %}

            <option value="{{ model[0] }}">
                {{ model[1] }}
            </option>

            {% endfor %}

        </select>

        <button class="btn btn-success">
            Generate Response
        </button>

    </form>

</div>

</body>
</html>
