<!DOCTYPE html>

<html>
<head>
    <title>Edit Prompt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<h2>Edit Prompt</h2>

<form method="POST">

    <div class="mb-3">
        <label>Title</label>
        <input
            type="text"
            name="title"
            class="form-control"
            value="{{ prompt[1] }}"
            required>
    </div>

    <div class="mb-3">
        <label>Category</label>

        <select name="category_id" class="form-control">

            {% for category in categories %}

            <option
                value="{{ category[0] }}"
                {% if category[0] == prompt[2] %}
                    selected
                {% endif %}
            >
                {{ category[1] }}
            </option>

            {% endfor %}

        </select>
    </div>

    <div class="mb-3">
        <label>Prompt Text</label>

        <textarea
            name="prompt_text"
            rows="8"
            class="form-control"
            required>{{ prompt[3] }}</textarea>
    </div>

    <button type="submit" class="btn btn-success">
        Update Prompt
    </button>

</form>

</div>

</body>
</html>
