<!DOCTYPE html>
<html>
<head>
    <title>Favorites</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Favorite Prompts</h2>

    <a href="/dashboard"
       class="btn btn-secondary mb-3">
       Dashboard
    </a>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

        {% for prompt in favorites %}

        <tr>

            <td>{{ prompt[0] }}</td>
            <td>{{ prompt[1] }}</td>

            <td>

                <a href="/remove_favorite/{{ prompt[2] }}"
                   class="btn btn-danger btn-sm">
                   Remove
                </a>

            </td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
