<!DOCTYPE html>
<html>
<head>
    <title>Edit Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Edit Project</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Project Title</label>

            <input
                type="text"
                name="title"
                class="form-control"
                value="{{ project[1] }}"
                required>
        </div>

        <div class="mb-3">

            <label>Category</label>

            <select name="category_id" class="form-control">

                {% for category in categories %}

                <option
                    value="{{ category[0] }}"
                    {% if category[0] == project[2] %}
                        selected
                    {% endif %}
                >
                    {{ category[1] }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label>Status</label>

            <select name="status" class="form-control">

                <option value="Idea"
                    {% if project[4] == 'Idea' %}selected{% endif %}>
                    Idea
                </option>

                <option value="In Progress"
                    {% if project[4] == 'In Progress' %}selected{% endif %}>
                    In Progress
                </option>

                <option value="Completed"
                    {% if project[4] == 'Completed' %}selected{% endif %}>
                    Completed
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label>Description</label>

            <textarea
                name="description"
                rows="6"
                class="form-control"
                required>{{ project[3] }}</textarea>

        </div>

        <button
            type="submit"
            class="btn btn-success">
            Update Project
        </button>

    </form>

</div>

</body>
</html>
